version: '3.8'
services:
  db:
    image: postgres:15
    container_name: job_hunter_db
    restart: always
    environment:
      POSTGRES_USER: derya
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: job_hunter
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: