<div class="job-container">
  
  <div class="add-job-card">
    <h2>{{ isEditing ? 'Başvuruyu Düzenle' : 'Yeni Başvuru Ekle' }}</h2>
    
    <div class="form-row">
      <input 
        type="text" 
        [(ngModel)]="newJob.company" 
        placeholder="Şirket Adı (Örn: Getir)" 
      />
      <input 
        type="text" 
        [(ngModel)]="newJob.position" 
        placeholder="Pozisyon (Örn: Frontend Dev)" 
      />
    </div>

    <div class="form-row">
      <input 
        type="text" 
        [(ngModel)]="newJob.platform" 
        placeholder="Platform (LinkedIn, Kariyer.net)" 
      />
      
      <select [(ngModel)]="newJob.status" class="status-select">
        <option value="">Durum Seçiniz...</option>
        <option value="Başvuruldu">Başvuruldu 📩</option>
        <option value="Mülakat">Mülakat 🗣️</option>
        <option value="Teklif">Teklif 🤝</option>
        <option value="Red">Red ❌</option>
      </select>
      
      <div class="button-group">
        <button 
          *ngIf="isEditing" 
          (click)="resetForm()" 
          class="cancel-btn">
          Vazgeç
        </button>

        <button 
          (click)="addJob()" 
          [disabled]="isLoading"
          [class.update-btn]="isEditing" 
          class="add-btn">
          {{ isLoading ? 'İşleniyor...' : (isEditing ? 'Güncelle' : 'Ekle') }}
        </button>
      </div>
    </div>
  </div>

  <div class="job-list">
    
    <div class="filter-area">
      <label>Filtrele:</label>
      <select [(ngModel)]="filterStatus">
        <option value="ALL">Tümü</option>
        <option value="Başvuruldu">Başvuruldu</option>
        <option value="Mülakat">Mülakat</option>
        <option value="Teklif">Teklif</option>
        <option value="Red">Red</option>
      </select>
    </div>

    <p *ngIf="filteredJobs.length === 0" class="empty-state">
      Bu kriterde başvuru bulunamadı.
    </p>

    <div *ngFor="let job of filteredJobs" class="job-card">
      <div class="job-info">
        <h3>{{ job.position }}</h3>
        <span class="company">{{ job.company }}</span>
        
        <div class="details">
          <span class="platform" *ngIf="job.platform">📍 {{ job.platform }}</span>
          <span class="status">Durum: {{ job.status || 'Başvuruldu' }}</span>
        </div>
      </div>

      <div class="job-actions">
        <button (click)="onEdit(job)" class="edit-btn">
          Düzenle
        </button>

        <button (click)="deleteJob(job.id)" class="delete-btn">
          Sil 🗑️
        </button>
      </div>
    </div>
  </div>

</div>
